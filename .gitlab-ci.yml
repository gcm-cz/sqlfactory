stages:
  - test
  - build
  - release

test:
  image: registry.srv.gcm.cz/baseimage/python:3.11
  stage: test
  script:
    - poetry install --with=dev
    - poetry run pytest --cov=sqlfactory --cov-report=xml --cov-report=term
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

pylint:
  image: registry.srv.gcm.cz/baseimage/python:3.11
  stage: test
  script:
    - poetry install --with=dev
    - poetry run pylint sqlfactory

build-wheel:
  image: registry.srv.gcm.cz/baseimage/python:3.11-ci
  stage: build
  script:
    - /ci/build-wheel.sh
  artifacts:
    paths:
      - dist/*

release-wheel:
  image: registry.srv.gcm.cz/baseimage/python:3.11-ci
  stage: release
  dependencies:
      - build-wheel
  only:
      - tags
  script:
      - /ci/release-wheel.sh
  release:
      tag_name: $CI_COMMIT_TAG
      description: "$CI_COMMIT_TAG"

release-wheel-official:
  image: registry.srv.gcm.cz/baseimage/python:3.11-ci
  stage: release
  when: manual
  variables:
    PYPI_REPO: https://upload.pypi.org/legacy/
    PYPI_TOKEN: $PYPI_TOKEN_OFFICIAL
  dependencies:
      - build-wheel
  only:
      - tags
  script:
      - /ci/release-wheel.sh
